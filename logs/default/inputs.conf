# SkySQL Logs API Input Configuration
# This file configures the scripted input for polling SkySQL Logs API

[script://$SPLUNK_HOME/bin/scripts/skysql_logs_wrapper.sh]
disabled = false
index = skysql
interval = 300
sourcetype = skysql:logs
source = skysql_logs_api

# Script execution settings
passAuth = admin-all-objects
