# MariaDB Cloud Logs Props Configuration
# Field extractions and parsing rules for MariaDB Cloud logs.
#
# REFERENCE ONLY. The logs collector now sends events directly to Splunk
# Cloud via the HTTP Event Collector (HEC), so there is no Universal Forwarder
# to apply these settings. Install this stanza on the Splunk search head /
# indexer (e.g. as an app under $SPLUNK_HOME/etc/apps/.../default/props.conf)
# if you want these search-time field extractions for the sourcetype below.
# Events are sent as JSON, so most fields are already available via KV_MODE.
#
# The field names below match exactly what transform_to_hec_events emits in the
# event body: message, filename, logType, log.level, server, service,
# serverDataSourceId. The event timestamp is carried in the HEC envelope `time`
# field (epoch seconds) — Splunk sets _time from it, so there is no in-body
# timestamp to extract.

[mariadb:logs]
# Disable line merging for JSON events
SHOULD_LINEMERGE = false
TRUNCATE = 0

# _time is set from the HEC envelope `time` field; no in-body time extraction.

# JSON parsing
KV_MODE = json
INDEXED_EXTRACTIONS = json

# Field extractions. HEC unwraps the JSON `event` envelope, so fields are the
# top-level keys (no `event.` prefix). `log.level` is quoted because it contains
# a literal dot.
EVAL-log_level = coalesce('log.level', "info")
EVAL-server_id = 'serverDataSourceId'
EVAL-service_name = 'service'
EVAL-server_name = 'server'
EVAL-log_type = 'logType'

# Field aliases for common fields
FIELDALIAS-message = message AS log_message
FIELDALIAS-filename = filename AS log_filename

# Category for Splunk
category = Databases
