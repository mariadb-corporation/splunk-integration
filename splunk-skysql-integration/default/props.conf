# SkySQL Logs Props Configuration
# Field extractions and parsing rules for SkySQL logs

[skysql:logs]
# Disable line merging for JSON events
SHOULD_LINEMERGE = false
TRUNCATE = 0

# Time extraction
TIME_PREFIX = "timestamp"\s*:\s*"
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3NZ
MAX_TIMESTAMP_LOOKAHEAD = 32

# JSON parsing
KV_MODE = json
INDEXED_EXTRACTIONS = json

# Field extractions
EVAL-log_level = coalesce('event.level', 'event.severity', "info")
EVAL-server_id = 'event.serverDataSourceId'
EVAL-service_name = 'event.service'
EVAL-server_name = 'event.server'
EVAL-log_type = 'event.logType'
EVAL-log_id = 'event.id'

# Field aliases for common fields
FIELDALIAS-timestamp = event.timestamp AS log_timestamp
FIELDALIAS-message = event.message AS log_message
FIELDALIAS-filename = event.filename AS log_filename

# Category for Splunk
category = Databases

[skysql:logs:archive]
# Disable line merging for JSON events
SHOULD_LINEMERGE = false
TRUNCATE = 0

# Time extraction
TIME_PREFIX = "timestamp"\s*:\s*"
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3NZ
MAX_TIMESTAMP_LOOKAHEAD = 32

# JSON parsing
KV_MODE = json
INDEXED_EXTRACTIONS = json

# Field extractions for archive logs
EVAL-log_level = coalesce('event.level', 'event.severity', "info")
EVAL-server_id = 'event.serverDataSourceId'
EVAL-service_name = 'event.service'
EVAL-server_name = 'event.server'
EVAL-log_type = 'event.logType'

# Field aliases for common fields
FIELDALIAS-message = event.message AS log_message
FIELDALIAS-filename = event.filename AS log_filename

# Category for Splunk
category = Databases
